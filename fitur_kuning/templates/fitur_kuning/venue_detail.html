<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ venue.venue_name }} - TikTakTuk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .navbar {
            background: #000000;
        }
        .btn-logout {
            background: white;
            color: #000000;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            font-weight: 600;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'fitur_kuning:venue_list' %}">🎫 TikTakTuk</a>
            <a href="{% url 'web:logout' %}" class="btn-logout">Logout</a>
        </div>
    </nav>

    <div class="container" style="padding: 30px 0;">
        <div class="mb-4">
            <a href="{% url 'fitur_kuning:venue_list' %}" class="btn btn-sm btn-secondary">
                <i class="bi bi-arrow-left"></i> Kembali
            </a>
        </div>

        <div class="card">
            <div class="card-body">
                <h2 class="card-title mb-2">{{ venue.venue_name }}</h2>
                <p class="text-muted">{{ venue.address }}, {{ venue.city }}</p>
                
                <div class="row mt-4">
                    <div class="col-md-6">
                        <h5>Informasi Venue</h5>
                        <p><strong>Kapasitas:</strong> {{ venue.capacity }} kursi</p>
                        <p><strong>Alamat:</strong> {{ venue.address }}</p>
                        <p><strong>Kota:</strong> {{ venue.city }}</p>
                    </div>
                </div>

                {% if is_admin_or_organizer %}
                <div class="mt-4">
                    <button class="btn btn-primary">Edit</button>
                    <button class="btn btn-danger">Hapus</button>
                </div>
                {% endif %}
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
