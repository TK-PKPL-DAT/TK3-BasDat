<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Pembayaran Berhasil - TikTakTuk</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#F8FAFC] font-sans min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full bg-white p-10 rounded-[3rem] shadow-2xl border border-slate-100 text-center">
        <div class="w-24 h-24 bg-emerald-100 text-emerald-500 rounded-full flex items-center justify-center mx-auto mb-8 animate-bounce">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
            </svg>
        </div>

        <h1 class="text-3xl font-black text-slate-800 mb-4">Pembayaran Berhasil</h1>
        
        <div class="space-y-4">
            <p class="text-slate-500 font-medium leading-relaxed">
                Terima kasih sudah belanja di <span class="text-blue-600 font-black">tiktaktuk</span>! <br>
                Tiket Anda telah berhasil diamankan dan siap digunakan.
            </p>
            
            <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Status Pengalihan</p>
                <p class="text-sm font-bold text-slate-700">
                    Kembali ke Dashboard dalam <span id="countdown" class="text-blue-600 text-lg">5</span> detik...
                </p>
            </div>
        </div>

        <a href="{% url 'web:dashboard' %}" class="mt-8 block text-xs font-black text-blue-500 hover:text-blue-700 uppercase tracking-widest transition-all">
            Klik di sini jika tidak beralih otomatis
        </a>
    </div>

    <script>
        let seconds = 5;
        const countdownEl = document.getElementById('countdown');
        
        const timer = setInterval(() => {
            seconds--;
            countdownEl.innerText = seconds;
            if (seconds <= 0) {
                clearInterval(timer);
                window.location.href = "{% url 'web:dashboard' %}";
            }
        }, 1000);
    </script>
</body>
</html>
