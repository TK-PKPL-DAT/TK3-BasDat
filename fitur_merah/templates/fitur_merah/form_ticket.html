<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>{{ mode }} Tiket</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-500/50 min-h-screen flex items-center justify-center p-4 font-sans">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden">
        <div class="p-6 border-b border-slate-100 flex justify-between items-center">
            <h2 class="text-lg font-bold text-slate-800">{{ mode }} Tiket</h2>
            <a href="{% url 'fitur_merah:list_ticket' %}" class="text-slate-400 hover:text-slate-600">✕</a>
        </div>
        
        <form method="POST" class="p-6 space-y-5">
            {% csrf_token %}
            {% if mode == 'Tambah' %}
            <div>
                <label class="block text-[10px] font-bold uppercase text-slate-500 mb-2">Order</label>
                <select name="order_id" required class="w-full border border-slate-200 rounded-lg p-3 text-sm outline-none focus:border-blue-500 bg-white">
                    <option value="">Pilih Order...</option>
                    {% for o in orders %}
                        <option value="{{ o.0 }}">{{ o.0 }} - {{ o.1 }}</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label class="block text-[10px] font-bold uppercase text-slate-500 mb-2">Kategori Tiket</label>
                <select name="category_id" required class="w-full border border-slate-200 rounded-lg p-3 text-sm outline-none focus:border-blue-500 bg-white">
                    <option value="">Pilih Kategori...</option>
                    {% for c in categories %}
                        <option value="{{ c.0 }}">{{ c.1 }} - Rp {{ c.2|floatformat:0 }} ({{ c.3 }})</option>
                    {% endfor %}
                </select>
            </div>
            {% endif %}

            {% if mode == 'Update' %}
            <div>
                <label class="block text-[10px] font-bold uppercase text-slate-500 mb-2">Kode Tiket</label>
                <input type="text" disabled value="TTK-EVT001-VIP-001" class="w-full border border-slate-200 bg-slate-50 rounded-lg p-3 text-sm text-slate-500 font-mono">
            </div>
            <div>
                <label class="block text-[10px] font-bold uppercase text-slate-500 mb-2">Status</label>
                <select name="status" class="w-full border border-slate-200 rounded-lg p-3 text-sm outline-none focus:border-blue-500 bg-white">
                    <option value="valid">Valid</option>
                </select>
            </div>
            {% endif %}

            <div>
                <label class="block text-[10px] font-bold uppercase text-slate-500 mb-2">Kursi <span class="text-slate-400 lowercase normal-case">(opsional)</span></label>
                <select name="seat_id" class="w-full border border-slate-200 rounded-lg p-3 text-sm outline-none focus:border-blue-500 bg-white">
                    <option value="">Tanpa Kursi</option>
                    {% for s in seats %}
                        <option value="{{ s.0 }}">{{ s.1 }} — Baris {{ s.2 }}, No. {{ s.3 }}</option>
                    {% endfor %}
                </select>
            </div>

            {% if mode == 'Tambah' %}
            <div>
                <label class="block text-[10px] font-bold uppercase text-slate-500 mb-2">Kode Tiket</label>
                <input type="text" disabled placeholder="Auto-generate saat dibuat" class="w-full bg-slate-50 border border-slate-100 rounded-lg p-3 text-sm text-slate-400 font-mono">
            </div>
            {% endif %}

            <div class="flex gap-3 pt-4">
                <a href="{% url 'fitur_merah:list_ticket' %}" class="flex-1 py-3 border border-slate-200 rounded-lg text-center font-medium text-slate-600 hover:bg-slate-50 transition-colors">Batal</a>
                <button type="submit" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium transition-colors">
                    {% if mode == 'Tambah' %}Buat Tiket{% else %}Simpan{% endif %}
                </button>
            </div>
        </form>
    </div>
</body>
</html>
