<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>{{ mode }} Kursi</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-500/50 min-h-screen flex items-center justify-center p-4 font-sans">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden">
        <div class="p-6 border-b border-slate-100 flex justify-between items-center">
            <h2 class="text-lg font-bold text-slate-800">{{ mode }} Kursi</h2>
            <a href="{% url 'fitur_merah:list_seat' %}" class="text-slate-400 hover:text-slate-600">✕</a>
        </div>
        
        <form method="POST" class="p-6 space-y-5">
            {% csrf_token %}
            <div>
                <label class="block text-[10px] font-bold uppercase text-slate-500 mb-2">Venue</label>
                <select name="venue_id" required class="w-full border border-slate-200 rounded-lg p-3 text-sm outline-none focus:border-blue-500 bg-white">
                    {% for v in venues %}
                        <option value="{{ v.0 }}" {% if data and data.0 == v.0 %}selected{% endif %}>{{ v.1 }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-[10px] font-bold uppercase text-slate-500 mb-2">Section</label>
                <input type="text" name="section" value="{{ data.1|default:'' }}" required placeholder="cth. WVIP" class="w-full border border-slate-200 rounded-lg p-3 text-sm outline-none focus:border-blue-500">
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] font-bold uppercase text-slate-500 mb-2">Baris</label>
                    <input type="text" name="row" value="{{ data.2|default:'' }}" required placeholder="cth. A" class="w-full border border-slate-200 rounded-lg p-3 text-sm outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase text-slate-500 mb-2">No. Kursi</label>
                    <input type="text" name="number" value="{{ data.3|default:'' }}" required placeholder="cth. 1" class="w-full border border-slate-200 rounded-lg p-3 text-sm outline-none focus:border-blue-500">
                </div>
            </div>

            <div class="flex gap-3 pt-4">
                <a href="{% url 'fitur_merah:list_seat' %}" class="flex-1 py-3 border border-slate-200 rounded-lg text-center font-medium text-slate-600 hover:bg-slate-50 transition-colors">Batal</a>
                <button type="submit" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium transition-colors">
                    {% if mode == 'Tambah' %}Tambah{% else %}Simpan{% endif %}
                </button>
            </div>
        </form>
    </div>
</body>
</html>
